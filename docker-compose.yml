services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: dbanalyzer
      POSTGRES_USER: dbanalyzer
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  app:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://dbanalyzer:secret@postgres:5432/dbanalyzer?sslmode=disable
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    ports:
      - "8080:8080"

volumes:
  pgdata:
